<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class = "calculator">
        <h1 id = "Scientific-calculator">Scientific Calculator</h1>
        <div class="msg-container">

        </div>
        <div class="buttons">
        <table>
            <tr>
            <th><button class="deg">Deg</button></th>
            <th><button class="rad">Rad</button></th>
            <th><button class="fact">x!</button></th>
            <th><button class="op">(</button></th>
            <th><button class="op">)</button></th>
            <th><button class="op">%</button></th>
            <th><button class="clearbtn">AC</button></th>
            </tr>
            <tr>
            <td><button class="inv">Inv</button></td>
            <td><button class="sin inverse">sin</button></td>
            <td><button class="ln inverse">ln</button></td>
            <td><button class="number">7</button></td>
            <td><button class="number">8</button></td>
            <td><button class="number">9</button></td>
            <td><button class="op">/</button></td>
            </tr>
            <tr>
            <td><button class="constπ">π</button></td>
            <td><button class="cos inverse">cos</button></td>
            <td><button class="lg inverse">log</button></td>
            <td><button class="number">4</button></td>
            <td><button class="number">5</button></td>
            <td><button class="number">6</button></td>
            <td><button class="op">*</button></td>
            </tr>
            <tr>
            <td><button class="conste">e</button></td>
            <td><button class="tan">tan</button></td>
            <td><button class="sqroot inverse">√</button></td>
            <td><button class="number">1</button></td>
            <td><button class="number">2</button></td>
            <td><button class="number">3</button></td>
            <td><button class="op">-</button></td>
            </tr>
            <tr>
            <td><button class="ansval">Ans</button></td>
            <td><button class="reciprocal">1/x</button></td>
            <td><button class="power">x<sup>y</sup></button></td>
            <td><button class="number">0</button></td>
            <td><button class="op">.</button></td>
            <td><button class="ans">=</button></td>
            <td><button class="op">+</button></td> 
            </tr>
        </table>
        </div>
        <h2 class = "headinghistory">History</h2>
        <div class="history"></div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
